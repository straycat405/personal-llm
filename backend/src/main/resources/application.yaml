spring:
  application:
    name: btllm

  # ── 데이터소스 (pgvector Docker) ──────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/btllm
    username: btllm
    password: btllm1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30       # [성능] 기본값 10 → 30 (800 VU 부하 시 pending 180 → 0 목표)
      minimum-idle: 10            # 유휴 상태 최소 유지 커넥션
      connection-timeout: 3000    # 커넥션 획득 대기 최대 3초 (기본 30초 → 빠른 실패)

  # ── JPA ──────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create   # 개발 중 자동 테이블 생성 (운영 시 validate로 변경)
    open-in-view: false  # [성능] 커넥션 점유를 트랜잭션 종료 시점에 반환 (기본값 true → HTTP 응답까지 점유)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Spring AI - Ollama ────────────────────────────────────
  ai:
    ollama:
      base-url: http://localhost:11434   # Ollama 기본 포트
      chat:
        model: qwen3:8b
        options:
          temperature: 0.3              # [설계] 낮을수록 언어 전환 억제
          think: false      # qwen3 thinking 모드 비활성화 (스트리밍 시 <think> 태그 누출 방지)
      embedding:
        model: bge-m3                   # 한국어 임베딩 모델 (RAG용)

  # ── Spring AI - Anthropic Claude ──────────────────────────────
  # [설계] API key 주입 방법:
  #   환경변수 SPRING_AI_ANTHROPIC_API_KEY=sk-ant-...  (Spring Boot 자동 바인딩)
  # 미설정 시 AnthropicChatModel 자동 구성 안 됨 → /api/v1/models available=false 반환
    anthropic:
      chat:
        options:
          model: claude-sonnet-4-6        # ChatClientFactory에서 요청별 오버라이드 가능
          temperature: 0.3                # 한국어 응답 일관성

  # ── Spring AI - Google Gemini ────────────────────────────────
  # [설계] API key 주입 방법:
  #   환경변수 GOOGLE_AI_API_KEY=AIza...  (Spring Boot 자동 바인딩)
  # 미설정 시 GoogleGenAiChatModel 자동 구성 안 됨 → /api/v1/models available=false 반환
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY:}       # 빈 문자열 = 미설정 → 자동 구성 비활성화
        chat:
          options:
            model: gemini-2.5-flash           # ChatClientFactory에서 요청별 오버라이드 가능
            temperature: 0.3                  # 낮은 온도 → 일관된 한국어 응답

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

    # ── pgvector 설정 ─────────────────────────────────────
    vectorstore:
      pgvector:
        initialize-schema: true         # 앱 시작 시 vector 테이블 자동 생성
        index-type: hnsw                # 근사 최근접 이웃 인덱스 (빠른 검색)
        distance-type: cosine_distance  # 코사인 유사도 (의미 검색에 적합)
        dimensions: 1024                # bge-m3 벡터 차원수

  # ── 파일 업로드 크기 제한 ────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB      # 기본 1MB → PDF·Word 문서 업로드 허용
      max-request-size: 52MB   # 파일 + 폼 필드 합산 (여유 2MB)

  # ── Security (개발용 임시 비활성화) ──────────────────────
  security:
    user:
      name: admin
      password: admin

# ── 서버 포트 ─────────────────────────────────────────────
server:
  port: 8080
  tomcat:
    threads:
      max: 400        # [성능] 기본값 200 → 400 (400 VU 부하 시 스레드 포화 해소)
      min-spare: 20   # 유휴 최소 스레드 (기본 10)

# ── Actuator + Prometheus ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics  # /actuator/prometheus 노출
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}    # Prometheus 레이블 자동 부착
    distribution:
      percentiles-histogram:
        hikaricp.connections.acquire: true        # HikariCP acquire time histogram 활성화 → p99 쿼리 가능

# ── JWT ──────────────────────────────────────────────────
jwt:
  # [설계] 개발 환경: 재시작마다 랜덤 secret → 기존 토큰 자동 무효화
  #         운영 환경: 환경변수 JWT_SECRET으로 고정값 주입 (ex. export JWT_SECRET=...)
  secret: ${JWT_SECRET:${random.value}}
  access-token-expiry-ms: 3600000   # 1시간