name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 백엔드 단위 테스트 ────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # [설계] temurin 배포판: Eclipse 재단 관리, LTS 17 안정적 지원
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # ~/.gradle 캐시 → 의존성 재다운로드 방지

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      # [설계] 외부 서비스(DB/Ollama) 없이 실행 가능한 단위 테스트만 존재
      # BtllmApplicationTests(@SpringBootTest) 삭제 전제
      - name: Run unit tests
        working-directory: backend
        run: ./gradlew test
        env:
          JWT_SECRET: test-secret-for-ci-only

      # 테스트 결과를 PR 코멘트/Summary에 표시
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: backend/build/reports/tests/test/

  # ── 프론트엔드 타입 체크 + 빌드 ──────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci  # package-lock.json 기준 재현 가능 설치

      - name: Type check and build
        working-directory: frontend
        run: npm run build  # tsc + vite build — 타입 에러 시 실패

  # ── Docker 이미지 빌드 검증 ───────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test  # 테스트 통과 후에만 빌드 시도
    steps:
      - uses: actions/checkout@v4

      # [설계] push: false — 레지스트리 인증 없이 빌드 성공 여부만 검증
      - uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false