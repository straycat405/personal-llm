services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: btllm-postgres
    environment:
      POSTGRES_DB: btllm
      POSTGRES_USER: btllm
      POSTGRES_PASSWORD: btllm1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btllm -d btllm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
